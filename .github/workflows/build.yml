name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.configuration }}|${{ matrix.platform }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [Win32, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: >
          msbuild winTouch.sln
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=${{ matrix.platform }}
          /m
          /nologo

      - name: Run tests
        if: matrix.configuration == 'Release' && matrix.platform == 'x64'
        run: >
          powershell -ExecutionPolicy Bypass -File tests/test.ps1
          -ExePath "${{ github.workspace }}\bin\x64\Release\touch.exe"
